<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tanishq Mishra — AI Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="description" content="Portfolio of Tanishq Mishra, AI Engineer specializing in LLMs, RAG, and Autonomous Agents." />
    <style>
:root {
  --theme-bg: #fafafa;
  --theme-accent: #dc2626;
  --theme-dark-accent: #fca5a5;
}
.dark {
  --theme-bg: #0a0a0a;
  --theme-accent: #dc2626;
  --theme-dark-accent: #7f1d1d;
}

@property --a { syntax: '<angle>'; inherits: true; initial-value: 0deg; }
@property --p { syntax: '<percentage>'; inherits: true; initial-value: 0%; }
@property --c1 { syntax: '<color>'; inherits: true; initial-value: #000; }
@property --c2 { syntax: '<color>'; inherits: true; initial-value: #000; }

.experience-bg-anim {
  --s: 80px;
  --_g: transparent, var(--c1) 2deg calc(var(--a) - 2deg), transparent var(--a);
  background: 
    conic-gradient(from calc(-45deg  - var(--a)/2) at top    var(--p) left  var(--p),var(--_g)),
    conic-gradient(from calc(-45deg  - var(--a)/2) at top    var(--p) left  var(--p),var(--_g)),
    conic-gradient(from calc( 45deg  - var(--a)/2) at top    var(--p) right var(--p),var(--_g)),
    conic-gradient(from calc( 45deg  - var(--a)/2) at top    var(--p) right var(--p),var(--_g)),
    conic-gradient(from calc(-135deg - var(--a)/2) at bottom var(--p) left  var(--p),var(--_g)),
    conic-gradient(from calc(-135deg - var(--a)/2) at bottom var(--p) left  var(--p),var(--_g)),
    conic-gradient(from calc( 135deg - var(--a)/2) at bottom var(--p) right var(--p),var(--_g)),
    conic-gradient(from calc( 135deg - var(--a)/2) at bottom var(--p) right var(--p),var(--_g))
    var(--c2) !important;
  background-size: calc(2*var(--s)) calc(2*var(--s)) !important;
  animation: expBgAnim 2s infinite alternate linear;
}

@keyframes expBgAnim {
  0%,15% { --a: 135deg; --p: 20%; --c1: var(--theme-accent); --c2: var(--theme-bg); background-position: 0 0,var(--s) var(--s); }
  45%,50% { --a: 90deg; --p: 25%; --c1: var(--theme-accent); --c2: var(--theme-bg); background-position: 0 0,var(--s) var(--s); }
  50.01%,55% { --a: 90deg; --p: 25%; --c2: var(--theme-accent); --c1: var(--theme-bg); background-position: var(--s) 0,0 var(--s); }
  85%,100% { --a: 135deg; --p: 20%; --c2: var(--theme-accent); --c1: var(--theme-bg); background-position: var(--s) 0,0 var(--s); }
}

.skill-bg-anim {
  --s: 100px;
  --c1: var(--theme-accent);
  --c2: var(--theme-dark-accent);
  
  --_s: calc(2*var(--s)) calc(2*var(--s));
  --_g: var(--_s) conic-gradient(at 40% 40%,transparent 75%,var(--c1) 0deg);
  --_p: var(--_s) conic-gradient(at 20% 20%,transparent 75%,var(--c2) 0deg);
  background:
    calc( .9*var(--s)) calc( .9*var(--s))/var(--_p),
    calc(-.1*var(--s)) calc(-.1*var(--s))/var(--_p),
    calc( .7*var(--s)) calc( .7*var(--s))/var(--_g),
    calc(-.3*var(--s)) calc(-.3*var(--s))/var(--_g),
    conic-gradient(from 90deg at 20% 20%,var(--c2) 25%,var(--c1) 0deg) 
     0 0/var(--s) var(--s) !important;
  animation: skillBgAnim 3s infinite;
}

@keyframes skillBgAnim {
  0% { background-position: calc( .9*var(--s)) calc( .9*var(--s)), calc(-.1*var(--s)) calc(-.1*var(--s)), calc( .7*var(--s)) calc( .7*var(--s)), calc(-.3*var(--s)) calc(-.3*var(--s)),0 0 }
  25% { background-position: calc(1.9*var(--s)) calc( .9*var(--s)), calc(-1.1*var(--s)) calc(-.1*var(--s)), calc(1.7*var(--s)) calc( .7*var(--s)), calc(-1.3*var(--s)) calc(-.3*var(--s)),0 0 }
  50% { background-position: calc(1.9*var(--s)) calc(-.1*var(--s)), calc(-1.1*var(--s)) calc( .9*var(--s)), calc(1.7*var(--s)) calc(-.3*var(--s)), calc(-1.3*var(--s)) calc( .7*var(--s)),0 0 }
  75% { background-position: calc(2.9*var(--s)) calc(-.1*var(--s)), calc(-2.1*var(--s)) calc( .9*var(--s)), calc(2.7*var(--s)) calc(-.3*var(--s)), calc(-2.3*var(--s)) calc( .7*var(--s)),0 0 }
  100% { background-position: calc(2.9*var(--s)) calc(-1.1*var(--s)), calc(-2.1*var(--s)) calc(1.9*var(--s)), calc(2.7*var(--s)) calc(-1.3*var(--s)), calc(-2.3*var(--s)) calc(1.7*var(--s)),0 0 }
}
    </style>
  </head>
  <body class="bg-neutral-50 text-neutral-900 dark:bg-black dark:text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
